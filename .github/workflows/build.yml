        mkdir -p artifact-pi5
        cp build-pi5/mjpg_streamer artifact-pi5/
        mkdir -p artifact-pi5/plugins
        find build-pi5 -name "*.so" -exec cp {} artifact-pi5/plugins/ \;
        echo "📦 Created artifact structure:"
        ls -la artifact-pi5/
        echo "🔌 Available plugins:"
        ls -la artifact-pi5/plugins/
        echo "📊 Plugin count: $(ls artifact-pi5/plugins/*.so 2>/dev/null | wc -l)"
    
    - name: Upload Pi 5 artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mjpg-streamer-pi5
        path: artifact-pi5/

  build-summary:
    needs: [cross-compile-pi-zero, cross-compile-pi3-4, cross-compile-pi5]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Build Summary
      run: |
        echo "## 🚀 mjpg-streamer Raspberry Pi Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Supported Raspberry Pi Models:" >> $GITHUB_STEP_SUMMARY
        echo "- **Raspberry Pi Zero**: ARMv6 (soft-float)" >> $GITHUB_STEP_SUMMARY
        echo "- **Raspberry Pi 3**: ARMv7 (hard-float)" >> $GITHUB_STEP_SUMMARY
        echo "- **Raspberry Pi 4**: ARMv7 (hard-float)" >> $GITHUB_STEP_SUMMARY
        echo "- **Raspberry Pi 5**: ARM64" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🎯 Features:" >> $GITHUB_STEP_SUMMARY
        echo "- Motion detection plugin with percentage-based thresholds" >> $GITHUB_STEP_SUMMARY
        echo "- Webhook notifications (GET/POST with -w/-p parameters)" >> $GITHUB_STEP_SUMMARY
        echo "- Cross-compilation for all Pi models" >> $GITHUB_STEP_SUMMARY
        echo "- Optimized for resource-constrained devices" >> $GITHUB_STEP_SUMMARY
        echo "- Fully static builds with no external dependencies" >> $GITHUB_STEP_SUMMARY
        echo "- HTTPS webhook support with mbedTLS" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Build Status:" >> $GITHUB_STEP_SUMMARY
        echo "Check the individual build jobs above for detailed results." >> $GITHUB_STEP_SUMMARY