  cross-compile-pi5:
    name: Cross-compile Pi 5 (ARM64)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache cross-compilation tools
      uses: actions/cache@v4
      with:
        path: /usr/bin/*-aarch64-linux-gnu*
        key: cross-tools-arm64-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          cross-tools-arm64-${{ runner.os }}-
          cross-tools-${{ runner.os }}-

    - name: Install ARM64 cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        # Install static libraries for ARM64
        sudo apt-get install -y libc6-dev-arm64-cross libstdc++-13-dev-arm64-cross
        sudo apt-get install -y cmake pkg-config
    
    - name: Cache libjpeg for ARM64
      uses: actions/cache@v4
      with:
        path: /opt/libjpeg-arm64
        key: libjpeg-arm64-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          libjpeg-arm64-${{ runner.os }}-
          libjpeg-${{ runner.os }}-

    - name: Build libjpeg for ARM64
      run: |
        echo "Building libjpeg for ARM64 (Pi 5)"
        
        # Download libjpeg source
        wget http://www.ijg.org/files/jpegsrc.v9e.tar.gz
        tar -xzf jpegsrc.v9e.tar.gz
        cd jpeg-9e
        
        # Configure for ARM64 cross-compilation
        ./configure \
          --host=aarch64-linux-gnu \
          --prefix=/opt/libjpeg-arm64 \
          CC=aarch64-linux-gnu-gcc \
          CFLAGS="-march=armv8-a -O2"
        
        # Build and install
        make -j$(nproc)
        sudo make install
        
        echo "libjpeg for ARM64 installed to /opt/libjpeg-arm64"
        ls -la /opt/libjpeg-arm64/
    
    - name: Cache libcurl for ARM64
