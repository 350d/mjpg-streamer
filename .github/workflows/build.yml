          --host=aarch64-linux-gnu \
          --prefix=/opt/libcurl-arm64 \
          --disable-shared \
          --enable-static \
          --without-zlib \
          --without-zstd \
          --without-brotli \
          --without-libpsl \
          --without-librtmp \
          --without-libidn2 \
          --without-libssh2 \
          --without-nghttp2 \
          --without-ngtcp2 \
          --without-nghttp3 \
          --without-quiche \
          --without-ssl \
          --disable-ldap \
          --disable-ldaps \
          --disable-rtsp \
          --disable-proxy \
          --disable-dict \
          --disable-telnet \
          --disable-tftp \
          --disable-pop3 \
          --disable-imap \
          --disable-smb \
          --disable-smtp \
          --disable-gopher \
          --disable-manual \
          --disable-libcurl-option \
          --disable-ipv6 \
          --disable-ftp \
          --disable-file \
          --disable-ftps \
          --disable-https \
          --disable-sftp \
          --disable-scp \
          --disable-smtps \
          --disable-pop3s \
          --disable-imaps \
          --disable-http2 \
          --disable-http3 \
          --enable-http \
          CC=aarch64-linux-gnu-gcc \
          CFLAGS="-march=armv8-a -O2"
        
        # Build and install
