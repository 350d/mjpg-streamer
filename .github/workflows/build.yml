name: Build mjpg-streamer for Raspberry Pi

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  cross-compile-pi-zero:
    name: Cross-compile Pi Zero
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache cross-compilation tools
      uses: actions/cache@v4
      with:
        path: /usr/bin/*-arm-linux-gnueabi*
        key: cross-tools-armv6-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          cross-tools-armv6-${{ runner.os }}-
          cross-tools-${{ runner.os }}-

    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        # Install cross-compilers for ARMv6 (Pi Zero) - soft-float
        sudo apt-get install -y gcc-arm-linux-gnueabi g++-arm-linux-gnueabi
        # Install static libraries for ARMv6 - soft-float
        sudo apt-get install -y libc6-dev-armel-cross libstdc++-13-dev-armel-cross
        # Install build tools and dependencies
        sudo apt-get install -y cmake pkg-config
    
    - name: Cache libjpeg for ARMv6
      uses: actions/cache@v4
      with:
        path: /opt/libjpeg-armv6
        key: libjpeg-armv6-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          libjpeg-armv6-${{ runner.os }}-
          libjpeg-${{ runner.os }}-

    - name: Build libjpeg for ARMv6
      run: |
        echo "Building libjpeg for ARMv6 (Pi Zero)"
        
        # Download libjpeg source
        wget http://www.ijg.org/files/jpegsrc.v9e.tar.gz
        tar -xzf jpegsrc.v9e.tar.gz
        cd jpeg-9e
        
        # Configure for ARMv6 cross-compilation
        ./configure \
          --host=arm-linux-gnueabi \
          --prefix=/opt/libjpeg-armv6 \
          CC=arm-linux-gnueabi-gcc \
          CFLAGS="-march=armv6 -mfloat-abi=soft -O2"
        
        # Build and install
        make -j$(nproc)
        sudo make install
        
        echo "libjpeg for ARMv6 installed to /opt/libjpeg-armv6"
        ls -la /opt/libjpeg-armv6/
    
    - name: Cache libcurl for ARMv6
      uses: actions/cache@v4
      with:
        path: /opt/libcurl-armv6
        key: libcurl-armv6-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          libcurl-armv6-${{ runner.os }}-
          libcurl-${{ runner.os }}-

    - name: Build libcurl for ARMv6
      run: |
        echo "Building libcurl for ARMv6 (Pi Zero)"
        
        # Download libcurl source
        wget https://curl.se/download/curl-8.4.0.tar.gz
        tar -xzf curl-8.4.0.tar.gz
        cd curl-8.4.0
        
        # Configure for ARMv6 cross-compilation
        ./configure \
          --host=arm-linux-gnueabi \
          --prefix=/opt/libcurl-armv6 \
          --disable-shared \
          --enable-static \
          --without-zlib \
          --without-zstd \
          --without-brotli \
          --without-libpsl \
          --without-librtmp \
          --without-libidn2 \
          --without-libssh2 \
          --without-nghttp2 \
          --without-ngtcp2 \
          --without-nghttp3 \
          --without-quiche \
          --without-ssl \
          --disable-ldap \
          --disable-ldaps \
          --disable-rtsp \
          --disable-proxy \
          --disable-dict \
          --disable-telnet \
          --disable-tftp \
          --disable-pop3 \
          --disable-imap \
          --disable-smb \
          --disable-smtp \
          --disable-gopher \
          --disable-manual \
          --disable-libcurl-option \
          --disable-ipv6 \
          --disable-ftp \
          --disable-file \
          --disable-ftps \
          --disable-https \
          --disable-sftp \
          --disable-scp \
          --disable-smtps \
          --disable-pop3s \
          --disable-imaps \
          --disable-http2 \
          --disable-http3 \
          --enable-http \
          CC=arm-linux-gnueabi-gcc \
          CFLAGS="-march=armv6 -mfloat-abi=soft -O2"
        
        # Build and install
        make -j$(nproc)
        sudo make install
        
        echo "libcurl for ARMv6 installed to /opt/libcurl-armv6"
        ls -la /opt/libcurl-armv6/
    
    - name: Build mjpg-streamer for Pi Zero
      run: |
        echo "Building mjpg-streamer for Pi Zero (ARMv6 soft-float)"
        
        # Debug: Check if cmake files exist
        echo "=== Checking cmake files ==="
        ls -la src/cmake/
        echo "=== Current directory ==="
        pwd
        echo "=== Source directory contents ==="
        ls -la
        
        export CC=arm-linux-gnueabi-gcc
        export CXX=arm-linux-gnueabi-g++
        export JPEG_ROOT=/opt/libjpeg-armv6
        export CURL_ROOT=/opt/libcurl-armv6
        
        # Create build directory
        mkdir -p build-pi-zero
        cd build-pi-zero
        
        # Configure CMake for ARMv6
        cmake .. \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=arm \
          -DCMAKE_C_COMPILER=arm-linux-gnueabi-gcc \
          -DCMAKE_CXX_COMPILER=arm-linux-gnueabi-g++ \
          -DCMAKE_C_FLAGS="-march=armv6 -mfloat-abi=soft -Wno-unused-result -Wno-format-overflow" \
          -DCMAKE_CXX_FLAGS="-march=armv6 -mfloat-abi=soft -Wno-unused-result -Wno-format-overflow" \
          -DCMAKE_EXE_LINKER_FLAGS="-static" \
          -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--as-needed -Wl,--allow-shlib-undefined" \
          -DCMAKE_BUILD_TYPE=Release \
          -DJPEG_INCLUDE_DIR=${JPEG_ROOT}/include \
          -DJPEG_LIBRARY=${JPEG_ROOT}/lib/libjpeg.a \
          -DCURL_INCLUDE_DIR=${CURL_ROOT}/include \
          -DCURL_LIBRARY=${CURL_ROOT}/lib/libcurl.a
        
        # Build with clean output
        echo "🔨 Building mjpg-streamer..."
        make -j$(nproc) 2>/dev/null || make -j$(nproc)
        echo "✅ Build completed successfully!"
        
        # Check what plugins were built
        echo "🔌 Checking built plugins:"
        if [ -d plugins ]; then
          ls -la plugins/*.so 2>/dev/null || echo "No .so files found in plugins/"
          echo "📊 Total plugins built: $(ls plugins/*.so 2>/dev/null | wc -l)"
        else
          echo "❌ plugins/ directory not found"
        fi
        
        # Check if binaries were created
        if [ -f mjpg_streamer ]; then
          echo "=== Pi Zero binary info ==="
          file mjpg_streamer
          ls -lh mjpg_streamer
          echo "=== Dependencies check ==="
          arm-linux-gnueabi-readelf -d mjpg_streamer || echo "Static binary (no dynamic deps)"
        else
          echo "Cross-compilation failed"
          exit 1
        fi
        
        # Create proper artifact structure
        cd ..
        mkdir -p artifact-pi-zero
        cp build-pi-zero/mjpg_streamer artifact-pi-zero/
        mkdir -p artifact-pi-zero/plugins
        find build-pi-zero -name "*.so" -exec cp {} artifact-pi-zero/plugins/ \;
        echo "📦 Created artifact structure:"
        ls -la artifact-pi-zero/
        echo "🔌 Available plugins:"
        ls -la artifact-pi-zero/plugins/
        echo "📊 Plugin count: $(ls artifact-pi-zero/plugins/*.so 2>/dev/null | wc -l)"
    
    - name: Upload Pi Zero artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mjpg-streamer-pi-zero
        path: artifact-pi-zero/

