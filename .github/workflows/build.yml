          --disable-rtsp \
          --disable-proxy \
          --disable-dict \
          --disable-telnet \
          --disable-tftp \
          --disable-pop3 \
          --disable-imap \
          --disable-smb \
          --disable-smtp \
          --disable-gopher \
          --disable-manual \
          --disable-libcurl-option \
          --disable-ipv6 \
          --disable-ftp \
          --disable-file \
          --disable-ftps \
          --disable-https \
          --disable-sftp \
