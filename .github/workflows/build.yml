        restore-keys: |
          cross-tools-armv7-${{ runner.os }}-
          cross-tools-${{ runner.os }}-

    - name: Install ARM cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
        # Install static libraries for ARMv7
        sudo apt-get install -y libc6-dev-armhf-cross libstdc++-13-dev-armhf-cross
        sudo apt-get install -y cmake pkg-config
    
    - name: Cache libjpeg for ARMv7
      uses: actions/cache@v4
      with:
        path: /opt/libjpeg-armv7
        key: libjpeg-armv7-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          libjpeg-armv7-${{ runner.os }}-
          libjpeg-${{ runner.os }}-

    - name: Build libjpeg for ARMv7
      run: |
        echo "Building libjpeg for ARMv7 (Pi 3/4)"
        
        # Download libjpeg source
        wget http://www.ijg.org/files/jpegsrc.v9e.tar.gz
        tar -xzf jpegsrc.v9e.tar.gz
        cd jpeg-9e
        
        # Configure for ARMv7 cross-compilation
        ./configure \
          --host=arm-linux-gnueabihf \
          --prefix=/opt/libjpeg-armv7 \
          CC=arm-linux-gnueabihf-gcc \
          CFLAGS="-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -O2"
        
        # Build and install
        make -j$(nproc)
        sudo make install
        
        echo "libjpeg for ARMv7 installed to /opt/libjpeg-armv7"
