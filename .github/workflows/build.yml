        export CXX=aarch64-linux-gnu-g++
        export JPEG_ROOT=/opt/libjpeg-arm64
        export CURL_ROOT=/opt/libcurl-arm64
        
        # Create build directory
        mkdir -p build-pi5
        cd build-pi5
        
        # Configure CMake for ARM64
        cmake .. \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
          -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
          -DCMAKE_C_FLAGS="-march=armv8-a -Wno-unused-result -Wno-format-overflow" \
          -DCMAKE_CXX_FLAGS="-march=armv8-a -Wno-unused-result -Wno-format-overflow" \
          -DCMAKE_EXE_LINKER_FLAGS="-static" \
          -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--as-needed -Wl,--allow-shlib-undefined" \
          -DCMAKE_BUILD_TYPE=Release \
          -DJPEG_INCLUDE_DIR=${JPEG_ROOT}/include \
          -DJPEG_LIBRARY=${JPEG_ROOT}/lib/libjpeg.a \
          -DCURL_INCLUDE_DIR=${CURL_ROOT}/include \
          -DCURL_LIBRARY=${CURL_ROOT}/lib/libcurl.a
        
